services:
  database:
    image: mysql:8.4
    container_name: project-management-database
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-project_db}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_USER: ${MYSQL_USER:-project_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-project_password}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - project-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: project-management-backend:1.0.0
    container_name: project-management-backend
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    environment:
      PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:mysql://database:3306/${MYSQL_DATABASE:-project_db}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-project_user}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-project_password}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "false"
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    networks:
      - project-network

  frontend:
    build:
      context: ./project-management-frontend
      dockerfile: Dockerfile
    image: project-management-frontend:1.0.0
    container_name: project-management-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:8080
    ports:
      - "${FRONTEND_PORT:-4200}:80"
    networks:
      - project-network

volumes:
  mysql-data:

networks:
  project-network:
    driver: bridge
