<div class="container mt-5">

  <div class="card p-4 shadow">

    <h2 class="mb-4 text-center">
      Login
    </h2>

    <input
      [(ngModel)]="username"
      class="form-control mb-3"
      placeholder="Username">

    <input
      [(ngModel)]="password"
      type="password"
      class="form-control mb-3"
      placeholder="Password">

    <button
      class="btn btn-primary w-100"
      (click)="login()">

      Login

    </button>

  </div>

</div>
